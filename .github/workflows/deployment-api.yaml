name: Build and Push API to Amazon ECR

# This tells GitHub to run this pipeline ONLY when you push code to the 'main' branch,
# and ONLY if files inside the 'app' directory were changed.
on:
  push:
    branches:
      - main
    paths:
      - 'app/**'

jobs:
  build-and-push:
    name: Build Docker Image and Push to AWS
    runs-on: ubuntu-latest

    steps:
    # 1. Grab the latest code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Securely log into your AWS account using GitHub Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 3. Log Docker into your private AWS Elastic Container Registry
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Build the image and push it to AWS
    - name: Build, tag, and push Docker image
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: fraud-detection-api
        IMAGE_TAG: latest # In a real enterprise setup, you'd use ${{ github.sha }} for unique versioning
      working-directory: ./app
      run: |
        docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG